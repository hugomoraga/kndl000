# Minimal Jekyll configuration for GitHub Pages

# Site settings
title: "KNDL 000"
description: "Fragments on technology, art, culture, philosophy — and the quiet noise of life."
author: "KNDL"
baseurl: ""
url: "https://kundala000.com"
locale: es_ES
# Imagen por defecto para redes (opcional; ruta bajo el sitio, ej. /assets/media/og.jpg)
# seo_image:

# Google Analytics 4 (ID en analytics.google.com → Administración → flujos de datos)
analytics:
  ga4_measurement_id: "G-2VWGMP1T5M"

# Build settings
markdown: kramdown
kramdown:
  hard_wrap: false
theme:
plugins:
  - jekyll-feed
  - jekyll-sitemap

# Include admin directory for Sveltia CMS
include:
  - admin

# Exclude non-site directories from build
exclude:
  - specs
  - .specify
  - .github
  - .vscode
  - node_modules
  - package.json
  - package-lock.json
  - assets/js/umbral-vision/package.json
  - assets/js/umbral-vision/package-lock.json
  - assets/js/umbral-vision/esbuild.config.mjs
  - assets/js/umbral-vision/eslint.config.mjs
  - assets/js/umbral-vision/vitest.config.mjs
  - assets/js/umbral-vision/tests
  - assets/js/umbral-vision/CHANGELOG.md
  - assets/js/umbral-vision/README.md
  - assets/js/umbral-vision/LICENSE
  - package.json
  - package-lock.json
  - Gemfile
  - Gemfile.lock
  - README.md
  - ESTRUCTURA.md
  - .ruby-version
  - vendor
  - .bundle

# Collections configuration
collections_dir: content/collections

collections:
  images:
    output: true
    permalink: /imagenes/:name/
  poems:
    output: true
    permalink: /poemas/:name/
  vestigios:
    output: true
    permalink: /vestigios/:name/
  melange_reports:
    output: true
    permalink: /melange-reports/:name/
  fragmentos:
    # Los fragmentos no son publicaciones: viven solo en /fragmentos/index.md
    # No se generan páginas individuales. Ver specs/006-fragmentos-refactor.
    output: false
  spotify_playlists:
    output: false
  youtube_setlists:
    output: false
  personal_music:
    output: false
  codigos:
    output: true
    permalink: /codigo/:name/
  dispositivos:
    output: true
    permalink: /dispositivos/:name/

defaults:
  - scope:
      path: "content/collections/_posts"
    values:
      published: true
  - scope:
      type: melange_reports
    values:
      layout: melange-report
  - scope:
      type: dispositivos
    values:
      layout: dispositivo

{%- comment -%}
  Google Analytics 4 — ID en _config.yml → analytics.ga4_measurement_id
{%- endcomment -%}
{%- if site.analytics and site.analytics.ga4_measurement_id and site.analytics.ga4_measurement_id != "" -%}
<script async src="https://www.googletagmanager.com/gtag/js?id={{ site.analytics.ga4_measurement_id }}"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag("js", new Date());
  gtag("config", "{{ site.analytics.ga4_measurement_id }}");
</script>
{%- endif -%}

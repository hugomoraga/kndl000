<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>{{ page.title }} - {{ site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Lato:ital,wght@0,300;0,400;0,700;1,400&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>
    <script src="https://unpkg.com/tone"></script>
    {% unless page.effects == false %}
    <script src="{{ '/assets/js/core/image-effects.js' | relative_url }}" defer></script>
    {% endunless %}
    {% include analytics.html %}

  </head>
  <body>
    <main>
      {% include title.html %}

      {% if page.image %}
      {% include figure.html %}
      {% endif %}

      {{ content }}

      {% include back-button.html %}
    </main>
  </body>
</html>
